name: NurseDuty
options:
  bundleIdPrefix: com.example.nurseduty
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "18.0"
packages:
  NurseDutyModel:
    path: ../Modules/NurseDutyModel
targets:
  NurseDuty:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: NurseDutyModel
      - target: NurseDutyWidget       # embed the widget extension
    info:
      path: Info-App.plist
      properties:
        UILaunchScreen: {}
        CFBundleURLTypes:
          - CFBundleURLName: com.example.nurseduty
            CFBundleURLSchemes: [nurseduty]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.nurseduty.app
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        # ponytail: Swift 5 mode — keeps SwiftData/SwiftUI clear of strict-concurrency churn.
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_ENTITLEMENTS: Sources/NurseDuty.entitlements
  NurseDutyWidget:
    type: app-extension
    platform: iOS
    sources:
      - Widget
      - path: Sources/WidgetUI.swift   # shared view code (also compiled into the app)
    dependencies:
      - package: NurseDutyModel
    info:
      path: Info-Widget.plist
      properties:
        CFBundleDisplayName: NurseDuty
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.nurseduty.app.widget
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_ENTITLEMENTS: Widget/NurseDutyWidget.entitlements
