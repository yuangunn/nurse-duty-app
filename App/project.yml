name: NurseDuty
options:
  bundleIdPrefix: com.yuangunn.nurseduty
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "18.0"
packages:
  NurseDutyModel:
    path: ../Modules/NurseDutyModel
targets:
  NurseDuty:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: NurseDutyModel
      - target: NurseDutyWidget       # embed the widget extension
      - target: NurseDutyWatch        # embed the watchOS companion app
    info:
      path: Info-App.plist
      properties:
        CFBundleDisplayName: 데노
        UILaunchScreen: {}
        CFBundleURLTypes:
          - CFBundleURLName: com.yuangunn.nurseduty
            CFBundleURLSchemes: [nurseduty]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yuangunn.nurseduty.app
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        # ponytail: Swift 5 mode — keeps SwiftData/SwiftUI clear of strict-concurrency churn.
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Sources/NurseDuty.entitlements
  NurseDutyWidget:
    type: app-extension
    platform: iOS
    sources:
      - Widget
      - path: Sources/WidgetUI.swift   # shared view code (also compiled into the app)
      - path: Sources/DutyStyle.swift  # 1b tokens (duty gradients / warm palette)
    dependencies:
      - package: NurseDutyModel
    info:
      path: Info-Widget.plist
      properties:
        CFBundleDisplayName: 데노
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yuangunn.nurseduty.app.widget
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_ENTITLEMENTS: Widget/NurseDutyWidget.entitlements
  NurseDutyWatch:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - WatchApp
      - path: Sources/WidgetUI.swift   # shared Color(hex:) + accessory views
      - path: Sources/DutyStyle.swift  # 1b tokens (duty gradients / warm palette)
    dependencies:
      - package: NurseDutyModel
    info:
      path: Info-Watch.plist
      properties:
        WKApplication: true                                       # single-target watch app
        WKCompanionAppBundleIdentifier: com.yuangunn.nurseduty.app
        CFBundleDisplayName: 데노
        UIDeviceFamily: [4]                                       # Apple Watch (explicit plist doesn't auto-inject)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yuangunn.nurseduty.app.watchkitapp
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "4"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
