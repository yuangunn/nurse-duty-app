name: Android CI

on:
  push:
    branches: [main]
    paths: ['android/**', '.github/workflows/android.yml']
  pull_request:
    paths: ['android/**']

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: android }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }
      - uses: gradle/actions/setup-gradle@v4
      - name: Unit tests
        run: ./gradlew :domain:test :app:testDebugUnitTest --console=plain
      - name: Assemble debug APKs
        run: ./gradlew :app:assembleDebug :wear:assembleDebug --console=plain
      - uses: actions/upload-artifact@v4
        with:
          name: debug-apks
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/wear/build/outputs/apk/debug/wear-debug.apk
          retention-days: 14
